name: perf-enforced

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, master]

jobs:
  perf-bundle:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    env:
      DESKTOP_PET_STRICT_PERF: "1"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run perf:bundle:gate

  perf-build:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    env:
      DESKTOP_PET_STRICT_PERF: "1"
      DESKTOP_PET_ENFORCE_BUILD_DELTA: ${{ vars.PERF_ENFORCE_BUILD_DELTA }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run perf:build:gate

  perf-assets:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: ASSET_MAX_BYTES=250000 bash scripts/perf/check-assets.sh

  perf-memory:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: MEMORY_MAX_DELTA_MB=5 npm run perf:memory

  perf-lighthouse:
    if: ${{ vars.PERF_PROFILE == 'production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run perf:lhci:prod

  perf-api:
    if: ${{ vars.PERF_PROFILE == 'production' && vars.PERF_BASE_URL != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: grafana/setup-k6-action@v1
      - run: k6 run tests/perf/api.k6.js --summary-export=.perf-results/api-summary.json
        env:
          BASE_URL: ${{ vars.PERF_BASE_URL }}
          API_P95_MS: "250"
          API_P99_MS: "700"

  perf-db:
    if: ${{ vars.PERF_PROFILE == 'production' && vars.PERF_DATABASE_URL != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: psql "${{ vars.PERF_DATABASE_URL }}" -f scripts/perf/db/check-pg-stat.sql
