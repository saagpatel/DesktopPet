name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: Build macOS Release Artifacts
    runs-on: macos-latest
    env:
      REQUIRE_MACOS_SIGNING: ${{ vars.REQUIRE_MACOS_SIGNING }}
      REQUIRE_MACOS_NOTARIZATION: ${{ vars.REQUIRE_MACOS_NOTARIZATION }}
      REQUIRE_TAURI_UPDATER: ${{ vars.REQUIRE_TAURI_UPDATER }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate macOS signing/notarization preflight
        run: npm run release:macos:preflight

      - name: Run canonical Tauri verification
        run: DESKTOP_PET_STRICT_RUST=1 npm run verify:required:tauri

      - name: Validate release artifacts
        run: npm run release:artifacts:validate

      - name: Package updater assets
        run: npm run release:updater:package

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-macos
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            artifacts/release/tauri-artifacts.txt
            artifacts/release/tauri-artifacts-sha256.txt
            artifacts/release/updater-artifacts.txt
            artifacts/release/updater-assets.tar.gz
          if-no-files-found: ignore

      - name: Publish GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            artifacts/release/tauri-artifacts-sha256.txt
          generate_release_notes: true

      - name: Publish updater release assets (tag builds only)
        if: startsWith(github.ref, 'refs/tags/') && hashFiles('artifacts/release/updater-assets.tar.gz') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release/updater-artifacts.txt
            artifacts/release/updater-assets.tar.gz
