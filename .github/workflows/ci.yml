name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run canonical frontend verification
        run: npm run verify:required:frontend

      - name: Upload frontend QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-qa-artifacts
          path: artifacts/*.*
          if-no-files-found: ignore

  tauri-backend:
    name: Tauri Backend + Bundle
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: DESKTOP_PET_STRICT_RUST=1 npm run test:smoke

      - name: Run canonical Tauri verification
        run: DESKTOP_PET_STRICT_RUST=1 npm run verify:required:tauri
